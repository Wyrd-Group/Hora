<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#0d1525"/>
      <stop offset="100%" stop-color="#060a12"/>
    </radialGradient>
    <linearGradient id="hexFill" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#00e5ff" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#00e5ff" stop-opacity="0.02"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glowStrong">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <!-- Grid pattern -->
    <pattern id="grid" width="64" height="64" patternUnits="userSpaceOnUse">
      <path d="M 64 0 L 0 0 0 64" fill="none" stroke="#00e5ff" stroke-opacity="0.04" stroke-width="0.5"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1024" height="1024" fill="url(#bg)"/>
  <rect width="1024" height="1024" fill="url(#grid)"/>

  <!-- Outer ring -->
  <circle cx="512" cy="512" r="380" fill="none" stroke="#005f6b" stroke-width="8"/>

  <!-- Inner glow ring -->
  <circle cx="512" cy="512" r="340" fill="none" stroke="#00e5ff" stroke-width="3" filter="url(#glow)"/>

  <!-- Hexagon -->
  <polygon points="512,292 702,402 702,622 512,732 322,622 322,402" fill="url(#hexFill)" stroke="#00e5ff" stroke-width="4" filter="url(#glow)"/>

  <!-- "A" letterform -->
  <text x="512" y="530" text-anchor="middle" font-family="Helvetica Neue, Arial, sans-serif" font-weight="bold" font-size="280" fill="#00e5ff" filter="url(#glowStrong)">A</text>

  <!-- "AEGIS" -->
  <text x="512" y="700" text-anchor="middle" font-family="Helvetica Neue, Arial, sans-serif" font-weight="bold" font-size="72" fill="#E8E0D0" letter-spacing="12">AEGIS</text>
</svg>
