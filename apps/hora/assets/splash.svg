<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 2732 2732" width="2732" height="2732">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#0d1525"/>
      <stop offset="100%" stop-color="#060a12"/>
    </radialGradient>
    <linearGradient id="hexFill" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#00e5ff" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#00e5ff" stop-opacity="0.01"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glowStrong">
      <feGaussianBlur stdDeviation="15" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <pattern id="grid" width="80" height="80" patternUnits="userSpaceOnUse">
      <path d="M 80 0 L 0 0 0 80" fill="none" stroke="#00e5ff" stroke-opacity="0.03" stroke-width="0.5"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="2732" height="2732" fill="url(#bg)"/>
  <rect width="2732" height="2732" fill="url(#grid)"/>

  <!-- Outer ring -->
  <circle cx="1366" cy="1366" r="500" fill="none" stroke="#005f6b" stroke-width="6"/>

  <!-- Inner glow ring -->
  <circle cx="1366" cy="1366" r="450" fill="none" stroke="#00e5ff" stroke-width="2" filter="url(#glow)"/>

  <!-- Hexagon -->
  <polygon points="1366,1066 1626,1216 1626,1516 1366,1666 1106,1516 1106,1216" fill="url(#hexFill)" stroke="#00e5ff" stroke-width="4" filter="url(#glow)"/>

  <!-- "A" -->
  <text x="1366" y="1400" text-anchor="middle" font-family="Helvetica Neue, Arial, sans-serif" font-weight="bold" font-size="380" fill="#00e5ff" filter="url(#glowStrong)">A</text>

  <!-- "AEGIS" -->
  <text x="1366" y="1620" text-anchor="middle" font-family="Helvetica Neue, Arial, sans-serif" font-weight="bold" font-size="96" fill="#E8E0D0" letter-spacing="16">AEGIS</text>

  <!-- "EMPIRE" subtitle -->
  <text x="1366" y="1700" text-anchor="middle" font-family="Helvetica Neue, Arial, sans-serif" font-weight="300" font-size="48" fill="#E8E0D0" fill-opacity="0.4" letter-spacing="24">EMPIRE</text>

  <!-- Loading dots -->
  <circle cx="1318" cy="1820" r="5" fill="#00e5ff"/>
  <circle cx="1342" cy="1820" r="5" fill="#00e5ff"/>
  <circle cx="1366" cy="1820" r="5" fill="#00e5ff"/>
  <circle cx="1390" cy="1820" r="5" fill="#00e5ff"/>
  <circle cx="1414" cy="1820" r="5" fill="#00e5ff"/>
</svg>
