[build]
  base = "apps/hora"
  command = "npm run build"
  publish = "apps/hora/dist"

[build.environment]
  NODE_VERSION = "20"

[functions]
  directory = "apps/hora/netlify/functions"

# SPA fallback — must come AFTER function routes
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
