# ============================================================================
# Dependabot — scan only the AEGIS Empire app
# ============================================================================
# /apps/empire is the active product. Legacy prototypes (glass, os-prototype,
# quantico-os) and the vendored flowcore reference code were moved to the
# `archive/prototypes` branch so GitHub's dependency graph stops flagging
# transitive advisories for unshipped code.
#
# When a new active app lands under /apps/, add another `package-ecosystem`
# block below pointing at its manifest directory.
# ============================================================================
version: 2
updates:
  # Primary app — prod + dev deps, weekly
  - package-ecosystem: "npm"
    directory: "/apps/empire"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Europe/Lisbon"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "app:empire"
    groups:
      # Group security patches so we don't drown in individual PRs
      security-patches:
        applies-to: "security-updates"
        patterns:
          - "*"
      # Keep react+dom in lockstep
      react:
        patterns:
          - "react"
          - "react-dom"
          - "@types/react"
          - "@types/react-dom"
      capacitor:
        patterns:
          - "@capacitor/*"
      deck-maps:
        patterns:
          - "@deck.gl/*"
          - "maplibre-gl"
          - "react-map-gl"
          - "@turf/*"
      tauri:
        patterns:
          - "@tauri-apps/*"
    ignore:
      # These are locked to major versions we intentionally pin
      - dependency-name: "typescript"
        update-types: ["version-update:semver-major"]
      - dependency-name: "vite"
        update-types: ["version-update:semver-major"]

  # GitHub Actions (repo-level) — weekly, separate from npm noise
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"
      - "ci"

  # Tauri Rust crate — weekly, only when /src-tauri exists
  - package-ecosystem: "cargo"
    directory: "/apps/empire/src-tauri"
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"
      - "app:empire"
      - "rust"

  # Python backends — weekly. Backends are not yet deployed but advisories
  # should still surface as PRs so we don't accumulate stale CVEs.
  - package-ecosystem: "pip"
    directory: "/api"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Europe/Lisbon"
    labels:
      - "dependencies"
      - "python"

  - package-ecosystem: "pip"
    directory: "/services/api"
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"
      - "python"

  - package-ecosystem: "pip"
    directory: "/services/ingestor"
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"
      - "python"
